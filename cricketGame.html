<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cricket game</title>
    <style>
        body {
            text-align: center;
            background-color: rgb(245, 244, 242);
        }
        .Choice-image {
        background-color: rgb(253, 251, 251);
        border-radius: 8px;
        padding: 5px;
        height: 100px;
        border: azure;
        
       }
         h1{
            color: red;
            font-size: xx-large;
            font-size: xx-large;
            font-family :'Times New Roman', Times, serif;
           
        } 
        .reset-button {
            padding-bottom: 20px;
            padding-top: 20px;
            padding-right: 20px;
            padding-left: 20px;
            font-size: xx-large;
            background-color: red;
            color: white;
           font-family: Verdana, Geneva, Tahoma, sans-serif;
            border-radius: 10px;
            font-weight: bolder;

        }
   
        
    </style>
</head>
<body>

    <h1 >Bat Ball Stump Game</h1>
   

    <button  onclick="
       let computerChoice = generateComputerChoice ();
       ShowResult ('Bat' , computerChoice);
    ">
       <img src="bat.jpg" alt="Bat Image" class="Choice-image">
    </button>


     <button onclick="
        let computerChoice = generateComputerChoice();
        ShowResult('Ball' , computerChoice);
    "><img src="ball.jpeg" alt="Ball Image" class="Choice-image"></button>


    <button onclick="
        let computerChoice = generateComputerChoice(); 
        ShowResult('Stump', computerChoice);  
    "><img src="stump.jpeg" alt="Stump Image" class="Choice-image"></button>

    <br> <br> <br><hr>

    <button class="reset-button" onclick="
       localStorage.clear() 
       resetScore();
    ">Reset</button>

<h3 id="user-move"></h3>
<h3 id="computer-move"></h3>
<h3 id="result"></h3>
<h3 id="score"></h3>




<script>
    let scoreStr = localStorage.getItem('score');
    let score ;
    resetScore(scoreStr);


    function resetScore (scoreStr){
        score = scoreStr ?  JSON.parse (scoreStr) :{
            win : 0 ,
            lost: 0 ,
            tie : 0 ,
            
       };
        score.displayScore = function   () {
        return `\nwon : ${score.win} \nlost : ${score.lost} \ntie : ${score.tie}`;
               
        };

    }




        function generateComputerChoice () {
             
             let randomNumber = Math.floor (Math.random( ) * 3) ;
             if (randomNumber === 0) {
                 return'Bat';
             } else if (randomNumber === 1) {
                 return 'Ball';
             } else {
                 return 'Stump';       
             }
             
        }


        function getResult (userChoice , computerChoice) {
            
            if (userChoice === 'Bat') {

                   if (computerChoice === 'Ball') {
                      score.win ++ ;
                      return 'you won';                   
                }  else if ( computerChoice === 'Stump' ){
                      score.lost ++ ;
                      return 'Computer wins';                   
                }  else {
                      score.tie ++ ;
                      return 'this one was a tie';
                      
                }  
             

            } else if (userChoice === 'Ball') {
                    
                    if (computerChoice === 'Ball') {
                         score.tie ++ ;
                        return 'this one was a tie';                      
                    }else if ( computerChoice === 'Stump' ){
                        score.win ++ ;
                        return'you won';                       
                    }else if ( computerChoice === 'Bat' ){
                        score.lost ++ ;
                        return 'Computer wins';
                        
                    }
                    


            } else if (userChoice === 'Stump') {
                    
                    if (computerChoice === 'Ball') {
                         score.lost ++ ;
                        return 'Computer wins';
                       
                    }else if ( computerChoice === 'Stump' ){
                        score.tie ++ ;
                        return'this one was a tie';
                        
                    }else if ( computerChoice === 'Bat' ){
                         score.win ++;
                        return 'you won';
                       
                    }                 

            }
        } 



         function ShowResult (userChoice , computerChoice) {
              
                
                let resultMsg = getResult (userChoice , computerChoice);
                localStorage.setItem ('score', JSON.stringify(score));

                document.querySelector('#user-move').innerText = ` You have chosen ${userChoice}`;

                document.querySelector('#computer-move').innerText = `Computer choice is ${computerChoice}`;

                
                document.querySelector('#result').innerText = resultMsg;
                document.querySelector('#score').innerText = score.displayScore();

                
            } 
            
            
       
</script>


</body>
</html>
